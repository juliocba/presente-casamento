<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>Lista de Presentes - Júlio & Hellen</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #81b0cc;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: rgb(0, 0, 0);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.03);
    }

    .card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }

    .card-body {
      padding: 15px;
    }

    .title {
      font-size: 14px;
      margin-bottom: 10px;
    }

    .price {
      font-weight: bold;
      color: #333;
    }

    /* MODAL */
    .modal {
      display: none;
      position: fixed;
      z-index: 10;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
    }

    .modal-content {
      background: white;
      margin: 10% auto;
      padding: 20px;
      border-radius: 12px;
      width: 300px;
      text-align: center;
    }

    .modal img {
      width: 180px;
      margin: 15px 0;
    }

    .close {
      float: right;
      font-size: 20px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>🎁 Lista de Presentes - Júlio & Hellen 💍</h1>

    <div class="grid">

      <div class="card" onclick="abrirModal()">
        <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93">
        <div class="card-body">
          <div class="title">1kg de café pra sobreviver ☕</div>
          <div class="price">R$ 50,00</div>
        </div>
      </div>

      <div class="card" onclick="abrirModal()">
        <img src="https://images.unsplash.com/photo-1546069901-eacef0df6022">
        <div class="card-body">
          <div class="title">1 mês de almoço garantido 🍛</div>
          <div class="price">R$ 400,00</div>
        </div>
      </div>

      <div class="card" onclick="abrirModal()">
        <img src="https://images.unsplash.com/photo-1519864600265-abb23847ef2c">
        <div class="card-body">
          <div class="title">Lua de mel 🌴 (prioridade 😍)</div>
          <div class="price">R$ 1000,00</div>
        </div>
      </div>

    </div>

  </div>

  <!-- MODAL -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="fecharModal()">&times;</span>

      <h2>💳 Presentear via Pix</h2>

      <img src="qrcode-pix.png" alt="QR Code Pix">

      <p>Ou use a chave:</p>
      <strong>hellengt02@gmail.com</strong>
    </div>
  </div>

  <script>
    function abrirModal() {
      document.getElementById("modal").style.display = "block";
    }

    function fecharModal() {
      document.getElementById("modal").style.display = "none";
    }

    // fechar clicando fora
    window.onclick = function (event) {
      let modal = document.getElementById("modal");
      if (event.target == modal) {
        modal.style.display = "none";
      }
    }
  </script>

</body>

</html>
